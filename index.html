<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PE-Fabrikation | Management System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #e5e7eb; margin: 0; }
        .sidebar-active { background: #4f46e5; color: white; }
        .custom-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const initApp = () => {
            try {
                const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                    apiKey: "AIzaSyAQPBKR6zWPySBvh2EHMgsj9cY1_idNjyg",
                    authDomain: "stunden-9ddd7.firebaseapp.com",
                    projectId: "stunden-9ddd7"
                };
                const appId = typeof __app_id !== 'undefined' ? __app_id : "stunden-9ddd7";
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                return { db: firebase.firestore(), auth: firebase.auth(), appId };
            } catch (err) {
                return null;
            }
        };

        const fb = initApp();

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const icons = {
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>,
                Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                Archive: <><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                Layout: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>,
                Trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return <svg viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>;
        };

        const getWeekNumber = (d) => {
            const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
        };

        const App = () => {
            if (!fb) return <div className="p-10">Fehler beim Laden von Firebase.</div>;
            const { db, auth, appId } = fb;

            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [selectedDept, setSelectedDept] = useState('');
            const [currentWeek, setCurrentWeek] = useState(getWeekNumber(new Date()));
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [showPdfMenu, setShowPdfMenu] = useState(false);
            
            const [depts, setDepts] = useState([]);
            const [employees, setEmployees] = useState([]);
            const [hours, setHours] = useState([]);
            const [holidays, setHolidays] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const publicRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

                const unsub1 = publicRef.collection('departments').onSnapshot(s => {
                    const d = s.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setDepts(d);
                    if (d.length && !selectedDept) setSelectedDept(d[0].id);
                });

                const unsub2 = publicRef.collection('employees').onSnapshot(s => {
                    setEmployees(s.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });

                const unsub3 = publicRef.collection('hours')
                    .where('year', '==', currentYear)
                    .where('week', '==', currentWeek)
                    .onSnapshot(s => setHours(s.docs.map(doc => doc.data())));

                const unsub4 = publicRef.collection('holidays')
                    .where('year', '==', currentYear)
                    .where('week', '==', currentWeek)
                    .onSnapshot(s => setHolidays(s.docs.map(doc => doc.data())));
                
                return () => { unsub1(); unsub2(); unsub3(); unsub4(); };
            }, [user, currentWeek, currentYear]);

            const exportPDF = (type) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(20);
                doc.text(`Zeiterfassung - ${type === 'week' ? 'Woche' : 'Jahr'}`, 14, 20);
                doc.setFontSize(12);
                doc.text(`Zeitraum: KW ${currentWeek} / ${currentYear}`, 14, 30);

                const tableData = [];
                const targetDepts = type === 'all' ? depts : depts.filter(d => d.id === selectedDept);

                targetDepts.forEach(dept => {
                    const deptEmps = employees.filter(e => e.department === dept.id);
                    deptEmps.forEach(emp => {
                        const total = hours.filter(h => h.employeeId === emp.id).reduce((s, h) => s + (h.hours || 0), 0);
                        tableData.push([dept.name, emp.name, total.toFixed(2) + " h"]);
                    });
                });

                doc.autoTable({
                    startY: 40,
                    head: [['Abteilung', 'Mitarbeiter', 'Stunden']],
                    body: tableData,
                });

                doc.save(`Export_${currentYear}_KW${currentWeek}.pdf`);
                setShowPdfMenu(false);
            };

            const toggleHoliday = async (day) => {
                const docId = `hol_${currentYear}_${currentWeek}_${day}`;
                const exists = holidays.find(h => h.weekday === day);
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('holidays').doc(docId);
                if (exists) {
                    await ref.delete();
                } else {
                    await ref.set({ year: currentYear, week: currentWeek, weekday: day, isHoliday: true });
                }
            };

            const saveHours = async (empId, day, val) => {
                const docId = `h_${currentYear}_${currentWeek}_${empId}_${day}`;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('hours').doc(docId).set({
                    employeeId: empId, year: currentYear, week: currentWeek, weekday: day, hours: parseFloat(val) || 0
                });
            };

            const deleteItem = async (col, id) => {
                if(confirm("Möchten Sie dieses Element wirklich löschen?")) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).doc(id).delete();
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-[#1e2330] text-white flex flex-col">
                        <div className="p-6 flex items-center gap-3">
                            <div className="bg-indigo-600 w-8 h-8 rounded-lg flex items-center justify-center font-bold">PE</div>
                            <span className="font-bold tracking-tight text-lg">MANAGEMENT</span>
                        </div>

                        <nav className="mt-4 px-3 space-y-1">
                            <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm ${view === 'dashboard' ? 'sidebar-active' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                <LucideIcon name="Layout" size={18}/> Dashboard
                            </button>
                            <button onClick={() => setView('archive')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm ${view === 'archive' ? 'sidebar-active' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                <LucideIcon name="Archive" size={18}/> Archiv
                            </button>
                            <button onClick={() => setView('admin')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm ${view === 'admin' ? 'sidebar-active' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                <LucideIcon name="Settings" size={18}/> Verwaltung
                            </button>
                        </nav>

                        <div className="mt-10 px-6">
                            <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">BEREICHE</h3>
                            <div className="space-y-2 overflow-y-auto max-h-64 custom-scrollbar">
                                {depts.map(d => (
                                    <button 
                                        key={d.id} 
                                        onClick={() => {setSelectedDept(d.id); setView('dashboard');}}
                                        className={`w-full text-left text-sm py-1 transition-all ${selectedDept === d.id && view === 'dashboard' ? 'text-indigo-400 font-bold' : 'text-slate-500 hover:text-slate-300'}`}
                                    >
                                        {d.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col bg-[#f3f4f6]">
                        {/* Header */}
                        <header className="bg-white h-16 flex items-center justify-between px-8 border-b border-slate-200">
                            <div className="flex items-center gap-4">
                                <h1 className="text-xl font-bold text-slate-800">Zeiterfassung</h1>
                                <div className="flex items-center bg-slate-100 rounded-lg p-1 gap-1">
                                    <button onClick={() => setCurrentWeek(w => w > 1 ? w - 1 : 52)} className="w-8 h-8 flex items-center justify-center hover:bg-white rounded transition-all text-slate-500">×</button>
                                    <span className="px-3 font-semibold text-sm">KW {currentWeek}</span>
                                    <button onClick={() => setCurrentWeek(w => w < 52 ? w + 1 : 1)} className="w-8 h-8 flex items-center justify-center hover:bg-white rounded transition-all text-slate-500">+</button>
                                </div>
                            </div>

                            <div className="relative">
                                <button 
                                    onClick={() => setShowPdfMenu(!showPdfMenu)}
                                    className="bg-[#4f46e5] text-white px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-indigo-700 transition-all custom-shadow"
                                >
                                    <LucideIcon name="Download" size={16}/> PDF Export
                                </button>
                                {showPdfMenu && (
                                    <div className="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-2xl border border-slate-100 z-50 p-2 overflow-hidden animate-in fade-in slide-in-from-top-2">
                                        <button onClick={() => exportPDF('week')} className="w-full text-left px-4 py-3 text-sm font-semibold hover:bg-slate-50 rounded-lg">Wochen-PDF (Abt.)</button>
                                        <button onClick={() => exportPDF('all')} className="w-full text-left px-4 py-3 text-sm font-semibold hover:bg-slate-50 rounded-lg border-t border-slate-100">Wochen-PDF (Alle Abt.)</button>
                                        <button onClick={() => exportPDF('year')} className="w-full text-left px-4 py-3 text-sm font-semibold hover:bg-slate-50 rounded-lg border-t border-slate-100">Jahres-PDF</button>
                                    </div>
                                )}
                            </div>
                        </header>

                        {/* Content Scroll Area */}
                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            {view === 'dashboard' && (
                                <div className="max-w-6xl mx-auto space-y-6">
                                    {/* Holiday Bar */}
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">FEIERTAGE KW {currentWeek}:</span>
                                        <div className="flex gap-2">
                                            {['Mo','Di','Mi','Do','Fr','Sa','So'].map((day, idx) => {
                                                const dayNum = idx + 1;
                                                const isHol = holidays.some(h => h.weekday === dayNum);
                                                return (
                                                    <button 
                                                        key={day} 
                                                        onClick={() => toggleHoliday(dayNum)}
                                                        className={`w-12 py-2 rounded-lg text-xs font-bold transition-all border ${isHol ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 border-slate-200 text-slate-400'}`}
                                                    >
                                                        {day}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Employee List */}
                                    <div className="grid gap-4">
                                        {employees.filter(e => e.department === selectedDept).map(emp => {
                                            const empHours = hours.filter(h => h.employeeId === emp.id);
                                            const total = empHours.reduce((s, h) => s + (h.hours || 0), 0);
                                            return (
                                                <div key={emp.id} className="bg-white p-6 rounded-2xl border border-slate-200 flex flex-col md:flex-row items-center gap-8 shadow-sm hover:shadow-md transition-shadow">
                                                    <div className="w-48">
                                                        <h3 className="font-bold text-slate-800 truncate">{emp.name}</h3>
                                                        <p className="text-[10px] text-slate-400 uppercase font-bold tracking-tight">ID: {emp.id.substring(0,6)}</p>
                                                    </div>

                                                    <div className="flex-1 flex gap-3">
                                                        {[1,2,3,4,5,6,7].map(day => {
                                                            const isHol = holidays.some(h => h.weekday === day);
                                                            const currentH = empHours.find(h => h.weekday === day)?.hours;
                                                            return (
                                                                <div key={day} className="flex flex-col items-center gap-1">
                                                                    <span className="text-[10px] text-slate-300 font-bold">{['Mo','Di','Mi','Do','Fr','Sa','So'][day-1]}</span>
                                                                    <div className="relative group">
                                                                        <input 
                                                                            type="number"
                                                                            value={currentH || ''}
                                                                            placeholder="0"
                                                                            onChange={(e) => saveHours(emp.id, day, e.target.value)}
                                                                            className={`w-12 h-12 text-center rounded-xl font-bold text-sm border-2 transition-all outline-none ${isHol ? 'bg-indigo-50 border-indigo-200 focus:border-indigo-400' : 'bg-slate-50 border-slate-100 focus:border-indigo-300'}`}
                                                                        />
                                                                        {isHol && currentH > 0 && (
                                                                            <div className="absolute -top-2 -right-2 text-amber-500 bg-white rounded-full" title="Achtung Feiertag!">
                                                                                <LucideIcon name="AlertCircle" size={14}/>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>

                                                    <div className="bg-slate-50 px-6 py-3 rounded-2xl border border-slate-100 text-right min-w-[120px]">
                                                        <div className="text-[10px] font-bold text-slate-400 uppercase">Summe</div>
                                                        <div className="text-2xl font-black text-indigo-600">{total.toFixed(1)} <span className="text-xs font-normal">h</span></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {view === 'archive' && (
                                <div className="max-w-4xl mx-auto">
                                    <div className="bg-white rounded-3xl border border-slate-200 overflow-hidden">
                                        <div className="p-8 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                                            <div>
                                                <h3 className="text-lg font-bold">Jahresübersicht</h3>
                                                <p className="text-sm text-slate-500">Wählen Sie ein Jahr für den PDF-Gesamtexport aller Abteilungen.</p>
                                            </div>
                                        </div>
                                        <div className="p-8 grid grid-cols-2 md:grid-cols-4 gap-4">
                                            {[2024, 2025, 2026, 2027].map(year => (
                                                <div key={year} className="group p-6 rounded-2xl border-2 border-slate-100 hover:border-indigo-200 transition-all text-center">
                                                    <div className="text-xl font-bold mb-4">{year}</div>
                                                    <button 
                                                        onClick={() => exportPDF('all')}
                                                        className="w-full bg-slate-50 text-slate-600 py-2 rounded-lg text-xs font-bold hover:bg-indigo-600 hover:text-white transition-all"
                                                    >
                                                        Alle Abteilungen
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'admin' && (
                                <div className="max-w-4xl mx-auto space-y-10">
                                    {/* Departments Admin */}
                                    <section className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <h3 className="text-lg font-bold mb-6">Abteilungen verwalten</h3>
                                        <form className="flex gap-4 mb-8" onSubmit={async (e) => {
                                            e.preventDefault();
                                            const name = e.target.deptName.value;
                                            if(!name) return;
                                            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('departments').add({ name });
                                            e.target.reset();
                                        }}>
                                            <input name="deptName" placeholder="Neue Abteilung (z.B. Logistik)" className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-indigo-300" required />
                                            <button className="bg-slate-900 text-white px-6 rounded-xl font-bold text-sm">Hinzufügen</button>
                                        </form>

                                        <div className="space-y-2">
                                            {depts.map(d => (
                                                <div key={d.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 group">
                                                    <span className="font-semibold">{d.name}</span>
                                                    <button onClick={() => deleteItem('departments', d.id)} className="text-slate-300 hover:text-red-500 transition-all">
                                                        <LucideIcon name="Trash" size={18}/>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    {/* Employee Admin */}
                                    <section className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <h3 className="text-lg font-bold mb-6">Mitarbeiter verwalten</h3>
                                        <form className="flex flex-wrap gap-4 mb-8" onSubmit={async (e) => {
                                            e.preventDefault();
                                            const name = e.target.empName.value;
                                            const deptId = e.target.empDept.value;
                                            if(!name || !deptId) return;
                                            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('employees').add({ name, department: deptId });
                                            e.target.reset();
                                        }}>
                                            <input name="empName" placeholder="Name des Mitarbeiters" className="flex-1 min-w-[200px] bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-indigo-300" required />
                                            <select name="empDept" className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-indigo-300" required>
                                                <option value="">Abteilung wählen...</option>
                                                {depts.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                                            </select>
                                            <button className="bg-indigo-600 text-white px-6 rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all">Hinzufügen</button>
                                        </form>

                                        <div className="space-y-2">
                                            {employees.map(emp => (
                                                <div key={emp.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 group">
                                                    <div className="flex flex-col">
                                                        <span className="font-semibold">{emp.name}</span>
                                                        <span className="text-[10px] text-slate-400 uppercase font-bold">{depts.find(d => d.id === emp.department)?.name || 'Unbekannt'}</span>
                                                    </div>
                                                    <button onClick={() => deleteItem('employees', emp.id)} className="text-slate-300 hover:text-red-500 transition-all">
                                                        <LucideIcon name="Trash" size={18}/>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
