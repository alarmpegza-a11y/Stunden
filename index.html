<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PE-Fabrikation | Management System</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Firebase SDKs (Compat Version für einfachere Einbindung) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sidebar-item-active { background: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Error Display Styles */
        #error-display { display: none; padding: 20px; background: #fee2e2; color: #b91c1c; border: 1px solid #f87171; border-radius: 8px; margin: 20px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="error-display"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Sicherstellen, dass Firebase geladen ist
        const initApp = () => {
            try {
                const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                    apiKey: "AIzaSyAQPBKR6zWPySBvh2EHMgsj9cY1_idNjyg",
                    authDomain: "stunden-9ddd7.firebaseapp.com",
                    projectId: "stunden-9ddd7"
                };
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : "stunden-9ddd7";

                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                
                return { db: firebase.firestore(), auth: firebase.auth(), appId };
            } catch (err) {
                const errDiv = document.getElementById('error-display');
                errDiv.style.display = 'block';
                errDiv.innerHTML = "<strong>Firebase Initialisierungsfehler:</strong> " + err.message;
                return null;
            }
        };

        const fb = initApp();

        // Lucide Icons Placeholder (Inline SVG)
        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const icons = {
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></>,
                Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                Archive: <><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                Trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                Layout: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                Alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                Calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>
            };
            return <svg viewBox="0 0 24 24" width={size} height={size} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const getWeek = (d) => {
            const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
            return Math.ceil((((date - new Date(Date.UTC(date.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
        };

        const App = () => {
            if (!fb) return <div className="p-10 text-red-600 font-bold">Firebase konnte nicht geladen werden. Bitte Internetverbindung und Konfiguration prüfen.</div>;
            
            const { db, auth, appId } = fb;

            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [selectedDept, setSelectedDept] = useState('');
            const [currentWeek, setCurrentWeek] = useState(getWeek(new Date()));
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [showExportMenu, setShowExportMenu] = useState(false);
            
            const [depts, setDepts] = useState([]);
            const [employees, setEmployees] = useState([]);
            const [hours, setHours] = useState([]);
            const [holidays, setHolidays] = useState([]);

            const exportMenuRef = useRef(null);

            // Auth Login
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Login Fehler", e); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            // Data Fetching
            useEffect(() => {
                if (!user) return;
                
                const rootRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

                const unsub1 = rootRef.collection('departments').onSnapshot(s => {
                    const d = s.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setDepts(d);
                    if (d.length && !selectedDept) setSelectedDept(d[0].id);
                });

                const unsub2 = rootRef.collection('employees').where('active', '==', true).onSnapshot(s => {
                    setEmployees(s.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });

                const unsub3 = rootRef.collection('hours')
                    .where('year', '==', currentYear)
                    .where('week', '==', currentWeek)
                    .onSnapshot(s => setHours(s.docs.map(doc => doc.data())), err => console.error("Hours Error", err));

                const unsub4 = rootRef.collection('holidays')
                    .where('year', '==', currentYear)
                    .where('week', '==', currentWeek)
                    .onSnapshot(s => setHolidays(s.docs.map(doc => doc.data())), err => console.error("Holiday Error", err));
                
                return () => { unsub1(); unsub2(); unsub3(); unsub4(); };
            }, [user, currentWeek, currentYear, selectedDept]);

            // PDF Logic
            const generatePDF = async (type = 'week', deptId = selectedDept) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const targetDept = depts.find(d => d.id === deptId);
                const deptName = targetDept?.name || "Unbekannt";
                const dateStr = type === 'week' ? `KW ${currentWeek} / ${currentYear}` : `${currentYear}`;

                doc.setFontSize(22);
                doc.text("Stundenabrechnung PE-Fabrikation", 14, 22);
                doc.setFontSize(12);
                doc.text(`Abteilung: ${deptName}`, 14, 32);
                doc.text(`Zeitraum: ${type.toUpperCase()} - ${dateStr}`, 14, 38);

                let reportData = [];
                const deptEmps = employees.filter(e => e.department === deptId);
                
                reportData = deptEmps.map(e => {
                    const total = hours.filter(h => h.employeeId === e.id).reduce((sum, h) => sum + (h.hours || 0), 0);
                    return [e.name, total.toFixed(2) + " h"];
                });

                doc.autoTable({
                    startY: 50,
                    head: [['Mitarbeiter', 'Gesamtstunden']],
                    body: reportData,
                    theme: 'striped',
                    headStyles: { fillColor: [79, 70, 229] }
                });

                doc.save(`Abrechnung_${deptName}_${type}.pdf`);
                setShowExportMenu(false);
            };

            const saveHours = async (empId, day, val) => {
                const docId = `${currentYear}_${currentWeek}_${empId}_${day}`;
                const employee = employees.find(e => e.id === empId);
                if(!employee) return;
                
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('hours').doc(docId).set({
                    employeeId: empId,
                    employeeName: employee.name,
                    departmentId: employee.department,
                    year: currentYear,
                    week: currentWeek,
                    weekday: day,
                    hours: parseFloat(val) || 0
                });
            };

            const toggleHoliday = async (day) => {
                const docId = `${currentYear}_${currentWeek}_day_${day}`;
                const existing = holidays.find(h => h.weekday === day);
                if (existing) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('holidays').doc(docId).delete();
                } else {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('holidays').doc(docId).set({
                        year: currentYear, week: currentWeek, weekday: day, isHoliday: true
                    });
                }
            };

            const filteredEmps = employees.filter(e => e.department === selectedDept);

            return (
                <div className="flex h-screen overflow-hidden text-slate-700 bg-slate-50">
                    {/* Navigation Sidebar */}
                    <nav className="w-72 bg-slate-900 text-white flex flex-col p-6 space-y-8 z-30 shadow-2xl">
                        <div className="flex items-center space-x-3 px-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-bold text-xl">PE</div>
                            <h1 className="text-lg font-extrabold tracking-tight">MANAGEMENT <span className="block text-indigo-400 text-[10px] uppercase tracking-widest">Fabrikation</span></h1>
                        </div>

                        <div className="space-y-1">
                            <button onClick={() => setView('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${view === 'dashboard' ? 'sidebar-item-active' : 'hover:bg-slate-800 text-slate-400'}`}>
                                <LucideIcon name="Layout" /> <span className="font-semibold text-sm">Dashboard</span>
                            </button>
                            <button onClick={() => setView('archive')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${view === 'archive' ? 'sidebar-item-active' : 'hover:bg-slate-800 text-slate-400'}`}>
                                <LucideIcon name="Archive" /> <span className="font-semibold text-sm">Archiv</span>
                            </button>
                            <button onClick={() => setView('admin')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${view === 'admin' ? 'sidebar-item-active' : 'hover:bg-slate-800 text-slate-400'}`}>
                                <LucideIcon name="Settings" /> <span className="font-semibold text-sm">Verwaltung</span>
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar pt-4">
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-3 mb-2">Abteilungen</p>
                            {depts.map(d => (
                                <button key={d.id} onClick={() => {setSelectedDept(d.id); setView('dashboard')}} className={`w-full text-left px-4 py-3 rounded-xl mb-1 transition-all text-sm font-medium ${selectedDept === d.id && view === 'dashboard' ? 'bg-indigo-600/10 text-indigo-400 border border-indigo-600/20' : 'text-slate-400 hover:text-white'}`}>
                                    {d.name}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        <header className="h-20 bg-white border-b border-slate-200 px-10 flex items-center justify-between">
                            <div className="flex items-center space-x-6">
                                <h2 className="text-xl font-bold text-slate-800">{view === 'dashboard' ? 'Zeiterfassung' : 'Verwaltung'}</h2>
                                <div className="flex items-center bg-slate-100 rounded-lg p-1">
                                    <button onClick={() => setCurrentWeek(w => Math.max(1, w-1))} className="p-1.5 hover:bg-white rounded-md"><LucideIcon name="Plus" size={16} className="rotate-45"/></button>
                                    <span className="px-4 font-bold text-sm">KW {currentWeek}</span>
                                    <button onClick={() => setCurrentWeek(w => Math.min(52, w+1))} className="p-1.5 hover:bg-white rounded-md"><LucideIcon name="Plus" size={16} /></button>
                                </div>
                            </div>
                            
                            <button onClick={() => generatePDF('week')} className="flex items-center space-x-2 bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:bg-indigo-700 transition-all">
                                <LucideIcon name="Download" size={16}/> <span>Wochen-PDF</span>
                            </button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-10 custom-scrollbar">
                            {view === 'dashboard' && (
                                <div className="max-w-6xl mx-auto space-y-6">
                                    <div className="bg-white rounded-2xl border border-slate-200 p-4 flex items-center space-x-4">
                                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Feiertage:</span>
                                        <div className="flex space-x-2">
                                            {[1,2,3,4,5,6,7].map(day => (
                                                <button key={day} onClick={() => toggleHoliday(day)} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${holidays.find(h => h.weekday === day) ? 'bg-amber-100 border-amber-200 text-amber-700' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                                    {['Mo','Di','Mi','Do','Fr','Sa','So'][day-1]}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-4">
                                        {filteredEmps.map(emp => {
                                            const empHours = hours.filter(h => h.employeeId === emp.id);
                                            const total = empHours.reduce((sum, h) => sum + (h.hours || 0), 0);
                                            return (
                                                <div key={emp.id} className="bg-white rounded-2xl border border-slate-200 p-6 flex flex-col md:flex-row items-center justify-between hover:shadow-xl transition-all">
                                                    <div className="w-full md:w-1/3">
                                                        <h4 className="font-bold text-slate-800">{emp.name}</h4>
                                                        <p className="text-[10px] text-slate-400">ID: {emp.id.substring(0,6)}</p>
                                                    </div>

                                                    <div className="flex-1 flex justify-center space-x-2 my-4 md:my-0">
                                                        {[1,2,3,4,5,6,7].map(day => (
                                                            <div key={day} className="flex flex-col items-center">
                                                                <span className="text-[9px] font-bold text-slate-300 uppercase mb-1">{['Mo','Di','Mi','Do','Fr','Sa','So'][day-1]}</span>
                                                                <input 
                                                                    type="number" 
                                                                    value={empHours.find(r => r.weekday === day)?.hours || ''} 
                                                                    placeholder="0"
                                                                    onChange={(e) => saveHours(emp.id, day, e.target.value)}
                                                                    className="w-12 h-10 text-center rounded-lg text-sm font-bold border-2 bg-slate-50 border-slate-100 outline-none focus:border-indigo-300"
                                                                />
                                                            </div>
                                                        ))}
                                                    </div>

                                                    <div className="text-right">
                                                        <div className="text-3xl font-black text-indigo-600">{total.toFixed(1)} <span className="text-sm text-slate-300">h</span></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {view === 'admin' && (
                                <div className="max-w-4xl mx-auto space-y-8">
                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <h3 className="text-lg font-bold mb-6">Neuer Mitarbeiter</h3>
                                        <form onSubmit={async (e) => {
                                            e.preventDefault();
                                            const name = e.target.name.value;
                                            const dept = e.target.dept.value;
                                            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('employees').add({
                                                name, department: dept, active: true
                                            });
                                            e.target.reset();
                                        }} className="flex gap-4">
                                            <input name="name" placeholder="Vorname Nachname" className="flex-1 bg-slate-50 border rounded-xl px-4 py-3" required/>
                                            <select name="dept" className="bg-slate-50 border rounded-xl px-4 py-3" required>
                                                {depts.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                                            </select>
                                            <button className="bg-slate-900 text-white px-8 rounded-xl font-bold">Hinzufügen</button>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (e) {
            console.error("Render Error", e);
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').innerText = "Render Fehler: " + e.message;
        }
    </script>
</body>
</html>
