<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispo & Montage Prozessor</title>
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel für Browser-Kompilierung -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Excel Bibliothek -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .output-text {
            font-family: 'Calibri', sans-serif;
            font-size: 11pt;
            white-space: pre;
            text-align: left;
            color: #000000;
        }
        .active-tab {
            border-bottom: 4px solid #1e3a8a;
            color: #1e3a8a;
            background-color: #eff6ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const excelDateToJSDate = (serial) => {
            if (typeof serial !== 'number') return new Date(serial);
            const utc_days = Math.floor(serial - 25569);
            const utc_value = utc_days * 86400;
            const date_info = new Date(utc_value * 1000);
            const fractional_day = serial - Math.floor(serial) + 0.0000001;
            let total_seconds = Math.floor(86400 * fractional_day);
            const seconds = total_seconds % 60;
            total_seconds -= seconds;
            const hours = Math.floor(total_seconds / (60 * 60));
            const minutes = Math.floor(total_seconds / 60) % 60;
            return new Date(date_info.getFullYear(), date_info.getMonth(), date_info.getDate(), hours, minutes, seconds);
        };

        const App = () => {
            const [mode, setMode] = useState('dispo'); 
            const [data, setData] = useState(null);
            const [rawRows, setRawRows] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setError(null);

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                        setRawRows(jsonData);
                        processExcelData(jsonData, mode);
                    } catch (err) {
                        setError("Fehler beim Verarbeiten der Datei.");
                        setLoading(false);
                    }
                };
                reader.readAsBinaryString(file);
            };

            useEffect(() => {
                if (rawRows) {
                    processExcelData(rawRows, mode);
                }
            }, [mode]);

            const processExcelData = (rows, currentMode) => {
                if (rows.length < 5) {
                    setError("Die Datei enthält zu wenig Daten.");
                    setLoading(false);
                    return;
                }

                let colMap = { date: 0, memo: 2, order: 3, customer: 4, street: 9, zip: 10, city: 11 };
                for (let i = 0; i < Math.min(rows.length, 15); i++) {
                    const row = rows[i];
                    if (!row) continue;
                    row.forEach((cell, idx) => {
                        const val = String(cell).toLowerCase().trim();
                        if (val.includes("datum")) colMap.date = idx;
                        if (val === "memo") colMap.memo = idx;
                        if (val === "auftrag") colMap.order = idx;
                        if (val === "kunde") colMap.customer = idx;
                        if (val === "strasse") colMap.street = idx;
                        if (val === "plz") colMap.zip = idx;
                        if (val === "ort") colMap.city = idx;
                    });
                }

                const deliveryGroups = {
                    1: { name: "Montag", items: [], date: null },
                    2: { name: "Dienstag", items: [], date: null },
                    3: { name: "Mittwoch", items: [], date: null },
                    4: { name: "Donnerstag", items: [], date: null },
                    5: { name: "Freitag", items: [], date: null }
                };

                for (let i = 9; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length < 2) continue;

                    const rawDate = row[colMap.date];
                    if (rawDate) {
                        const date = typeof rawDate === 'number' ? excelDateToJSDate(rawDate) : new Date(rawDate);
                        if (!isNaN(date.getTime())) {
                            const dayOfWeek = date.getDay();
                            if (deliveryGroups[dayOfWeek]) {
                                if (!deliveryGroups[dayOfWeek].date) deliveryGroups[dayOfWeek].date = date;

                                const kunde = (row[colMap.customer] || "").toString().trim();
                                const strasse = (row[colMap.street] || "").toString().trim();
                                const plz = (row[colMap.zip] || "").toString().trim();
                                const ort = (row[colMap.city] || "").toString().trim();
                                const rawMemo = (row[colMap.memo] || "").toString().trim();
                                const auftrag = (row[colMap.order] || "").toString().trim();
                                
                                const adresse = (strasse || plz || ort) ? `${strasse}, ${plz} ${ort}` : "";
                                const cleanMemo = rawMemo.replace(/\r?\n|\r/g, " ");

                                let formattedLine = "";
                                if (currentMode === 'dispo') {
                                    // Tourendispo: Jetzt auch mit / Trennung
                                    formattedLine = `LIEFERUNG / ${kunde} / ${adresse} / ${cleanMemo} / ${auftrag}/SLI`;
                                } else {
                                    // Montage-Modus: Wie gehabt ohne "LIEFERUNG" am Anfang
                                    formattedLine = `${kunde} / ${adresse} / ${cleanMemo}`;
                                }

                                deliveryGroups[dayOfWeek].items.push(formattedLine);
                            }
                        }
                    }
                }

                setData([1, 2, 3, 4, 5].map(day => deliveryGroups[day]));
                setLoading(false);
            };

            const formatDate = (date) => {
                if (!date) return "";
                return `${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}.${date.getFullYear()}`;
            };

            const handleCopy = () => {
                const text = document.getElementById('output-area').innerText;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            };

            const getAllMontageItems = () => {
                if (!data) return [];
                return data.reduce((acc, group) => [...acc, ...group.items], []);
            };

            return (
                <div className="min-h-screen pb-20">
                    <div className="bg-white shadow-sm mb-6 border-b">
                        <div className="max-w-6xl mx-auto flex">
                            <button 
                                onClick={() => setMode('dispo')}
                                className={`flex-1 py-4 text-center font-bold uppercase transition-all ${mode === 'dispo' ? 'active-tab' : 'text-gray-400 hover:text-gray-600'}`}
                            >
                                🚛 Tourendispo
                            </button>
                            <button 
                                onClick={() => setMode('montage')}
                                className={`flex-1 py-4 text-center font-bold uppercase transition-all ${mode === 'montage' ? 'active-tab' : 'text-gray-400 hover:text-gray-600'}`}
                            >
                                🛠️ Montage
                            </button>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-4">
                        <div className="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-gray-100">
                            <h1 className="text-2xl font-black text-center mb-8 text-slate-800 uppercase italic tracking-tight">
                                {mode === 'dispo' ? 'Tourendispo Prozessor' : 'Montage Liste (Alle Aufträge)'}
                            </h1>
                            
                            <div 
                                className="border-4 border-dashed border-gray-100 rounded-xl p-10 text-center mb-8 bg-slate-50 hover:border-blue-300 cursor-pointer transition-all"
                                onClick={() => fileInputRef.current.click()}
                            >
                                <p className="text-lg font-bold text-slate-500 italic">Hier Excel-Datei hochladen (.xlsx)</p>
                                <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx" className="hidden" />
                            </div>

                            {loading && <p className="text-center font-bold text-blue-600 animate-pulse">Wird umgewandelt...</p>}
                            {error && <p className="text-red-500 text-center font-bold">{error}</p>}

                            {data && (
                                <div className="animate-in fade-in duration-500">
                                    <div className={`flex justify-between items-center mb-6 p-4 rounded-xl ${mode === 'dispo' ? 'bg-blue-900' : 'bg-slate-800'}`}>
                                        <span className="text-white font-mono text-xs uppercase tracking-widest font-bold">
                                            {mode === 'dispo' ? 'Tourendispo / Format' : 'Montage / Format'}
                                        </span>
                                        <button 
                                            onClick={handleCopy} 
                                            className="bg-white text-slate-900 px-8 py-2 rounded-lg font-black hover:bg-slate-100 transition-all shadow-md active:scale-95"
                                        >
                                            📋 KOPIEREN
                                        </button>
                                    </div>
                                    
                                    <div id="output-area" className="bg-white p-8 border border-gray-200 rounded-xl shadow-inner overflow-x-auto output-text min-h-[300px]">
                                        {mode === 'dispo' ? (
                                            data.map((group, idx) => {
                                                if (group.items.length === 0) return null;
                                                return (
                                                    <div key={idx} className="mb-10 last:mb-0">
                                                        <div className="font-bold border-b-2 border-slate-100 pb-2 mb-4 text-slate-700 text-lg">
                                                            <span>{group.name} {formatDate(group.date)} ({group.items.length})</span>
                                                        </div>
                                                        {group.items.map((item, i) => (
                                                            <div key={i} className="py-0.5 hover:bg-slate-50 border-b border-transparent hover:border-slate-100">{item}</div>
                                                        ))}
                                                    </div>
                                                );
                                            })
                                        ) : (
                                            <div className="space-y-0.5">
                                                {getAllMontageItems().map((item, i) => (
                                                    <div key={i} className="py-0.5 hover:bg-slate-50 border-b border-transparent hover:border-slate-100">{item}</div>
                                                ))}
                                                {getAllMontageItems().length === 0 && <p className="text-slate-400 italic">Keine Montagedaten gefunden.</p>}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
