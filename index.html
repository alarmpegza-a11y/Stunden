<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourendispo Prozessor</title>
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel für Browser-Kompilierung -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Excel Bibliothek -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .output-text {
            font-family: 'Calibri', sans-serif;
            font-size: 11pt;
            white-space: pre;
            text-align: left;
            color: #000000;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const excelDateToJSDate = (serial) => {
            if (typeof serial !== 'number') return new Date(serial);
            const utc_days = Math.floor(serial - 25569);
            const utc_value = utc_days * 86400;
            const date_info = new Date(utc_value * 1000);
            const fractional_day = serial - Math.floor(serial) + 0.0000001;
            let total_seconds = Math.floor(86400 * fractional_day);
            const seconds = total_seconds % 60;
            total_seconds -= seconds;
            const hours = Math.floor(total_seconds / (60 * 60));
            const minutes = Math.floor(total_seconds / 60) % 60;
            return new Date(date_info.getFullYear(), date_info.getMonth(), date_info.getDate(), hours, minutes, seconds);
        };

        const App = () => {
            const [data, setData] = useState(null);
            const [rawRows, setRawRows] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [suffix, setSuffix] = useState('SLI'); // Standard-Kürzel
            const fileInputRef = useRef(null);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setError(null);

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                        setRawRows(jsonData);
                        processExcelData(jsonData, suffix);
                    } catch (err) {
                        setError("Fehler beim Verarbeiten der Datei.");
                        setLoading(false);
                    }
                };
                reader.readAsBinaryString(file);
            };

            // Falls sich das Suffix ändert, Daten neu prozessieren
            useEffect(() => {
                if (rawRows) {
                    processExcelData(rawRows, suffix);
                }
            }, [suffix]);

            const processExcelData = (rows, currentSuffix) => {
                if (rows.length < 5) {
                    setError("Die Datei enthält zu wenig Daten.");
                    setLoading(false);
                    return;
                }

                let colMap = { date: 0, memo: 2, order: 3, customer: 4, street: 9, zip: 10, city: 11 };
                for (let i = 0; i < Math.min(rows.length, 15); i++) {
                    const row = rows[i];
                    if (!row) continue;
                    row.forEach((cell, idx) => {
                        const val = String(cell).toLowerCase().trim();
                        if (val.includes("datum")) colMap.date = idx;
                        if (val === "memo") colMap.memo = idx;
                        if (val === "auftrag") colMap.order = idx;
                        if (val === "kunde") colMap.customer = idx;
                        if (val === "strasse") colMap.street = idx;
                        if (val === "plz") colMap.zip = idx;
                        if (val === "ort") colMap.city = idx;
                    });
                }

                const deliveryGroups = {
                    1: { name: "Montag", items: [], date: null },
                    2: { name: "Dienstag", items: [], date: null },
                    3: { name: "Mittwoch", items: [], date: null },
                    4: { name: "Donnerstag", items: [], date: null },
                    5: { name: "Freitag", items: [], date: null }
                };

                for (let i = 9; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length < 2) continue;

                    const rawDate = row[colMap.date];
                    if (rawDate) {
                        const date = typeof rawDate === 'number' ? excelDateToJSDate(rawDate) : new Date(rawDate);
                        if (!isNaN(date.getTime())) {
                            const dayOfWeek = date.getDay();
                            if (deliveryGroups[dayOfWeek]) {
                                if (!deliveryGroups[dayOfWeek].date) deliveryGroups[dayOfWeek].date = date;

                                const kunde = (row[colMap.customer] || "").toString().trim();
                                const strasse = (row[colMap.street] || "").toString().trim();
                                const plz = (row[colMap.zip] || "").toString().trim();
                                const ort = (row[colMap.city] || "").toString().trim();
                                const rawMemo = (row[colMap.memo] || "").toString().trim();
                                const auftrag = (row[colMap.order] || "").toString().trim();
                                
                                const adresse = (strasse || plz || ort) ? `${strasse}, ${plz} ${ort}` : "";
                                const cleanMemo = rawMemo.replace(/\r?\n|\r/g, " ");

                                // Neues Format: LIEFERUNG / Kunde / Adresse / Memo / Auftragsnr/Kürzel
                                const formattedLine = `LIEFERUNG / ${kunde} / ${adresse} / ${cleanMemo} / ${auftrag}/${currentSuffix}`;

                                deliveryGroups[dayOfWeek].items.push(formattedLine);
                            }
                        }
                    }
                }

                setData([1, 2, 3, 4, 5].map(day => deliveryGroups[day]));
                setLoading(false);
            };

            const formatDate = (date) => {
                if (!date) return "";
                return `${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}.${date.getFullYear()}`;
            };

            const handleCopy = () => {
                const text = document.getElementById('output-area').innerText;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            };

            return (
                <div className="min-h-screen pb-20 pt-10">
                    <div className="max-w-6xl mx-auto px-4">
                        <div className="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-gray-100">
                            <h1 className="text-3xl font-black text-center mb-8 text-blue-900 uppercase italic tracking-tight">
                                Tourendispo Prozessor
                            </h1>
                            
                            {/* Einstellungs-Bereich */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 bg-slate-50 p-6 rounded-xl border border-slate-100">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 uppercase mb-2">1. Kennzeichen wählen (z.B. SLI, DEL, SCO)</label>
                                    <input 
                                        type="text" 
                                        value={suffix}
                                        onChange={(e) => setSuffix(e.target.value.toUpperCase())}
                                        placeholder="z.B. SLI"
                                        className="w-full p-3 border-2 border-blue-200 rounded-lg font-bold text-blue-900 focus:border-blue-500 focus:outline-none uppercase"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 uppercase mb-2">2. Datei hochladen</label>
                                    <button 
                                        onClick={() => fileInputRef.current.click()}
                                        className="w-full bg-blue-900 text-white font-black py-3 rounded-lg hover:bg-blue-800 transition-all shadow-md"
                                    >
                                        EXCEL DATEI WÄHLEN
                                    </button>
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx" className="hidden" />
                                </div>
                            </div>

                            {loading && <p className="text-center font-bold text-blue-600 animate-pulse py-4">Wird umgewandelt...</p>}
                            {error && <p className="text-red-500 text-center font-bold py-4">{error}</p>}

                            {data && (
                                <div className="animate-in fade-in duration-500">
                                    <div className="flex justify-between items-center mb-6 p-4 rounded-xl bg-blue-900 shadow-lg">
                                        <div className="flex flex-col">
                                            <span className="text-blue-200 text-[10px] uppercase font-bold">Aktuelles Format</span>
                                            <span className="text-white font-mono text-xs font-bold">
                                                LIEFERUNG / Kunde / Adresse / Memo / Nr/{suffix}
                                            </span>
                                        </div>
                                        <button 
                                            onClick={handleCopy} 
                                            className="bg-white text-blue-900 px-8 py-2 rounded-lg font-black hover:bg-slate-100 transition-all shadow-md active:scale-95"
                                        >
                                            📋 TEXT KOPIEREN
                                        </button>
                                    </div>
                                    
                                    <div id="output-area" className="bg-white p-8 border border-gray-200 rounded-xl shadow-inner overflow-x-auto output-text min-h-[300px]">
                                        {data.map((group, idx) => {
                                            if (group.items.length === 0) return null;
                                            return (
                                                <div key={idx} className="mb-10 last:mb-0">
                                                    <div className="font-bold border-b-2 border-slate-100 pb-2 mb-4 text-slate-700 text-lg">
                                                        <span>{group.name} {formatDate(group.date)} ({group.items.length})</span>
                                                    </div>
                                                    {group.items.map((item, i) => (
                                                        <div key={i} className="py-0.5 hover:bg-slate-50 border-b border-transparent hover:border-slate-100">{item}</div>
                                                    ))}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
